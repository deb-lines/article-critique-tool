<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Article Critique Tool</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <header>
      <h1>Article Critique Tool</h1>
      <p class="subtitle">Paste an article URL or the article text below to receive a structured critique across five dimensions.</p>
    </header>

    <div class="input-section">
      <label for="url-input">Article URL</label>
      <input type="url" id="url-input" placeholder="https://example.com/article" />

      <div class="divider">— or paste the article text directly —</div>

      <label for="text-input">Article text</label>
      <textarea id="text-input" placeholder="Paste the full article text here..."></textarea>

      <button id="submit-btn" onclick="submitCritique()">Critique this article</button>
    </div>

    <div id="loading" class="state hidden">
      <p>Analysing article — this takes about 15 seconds...</p>
    </div>

    <div id="error-state" class="state hidden">
      <p id="error-message" class="error-text"></p>
    </div>

    <div id="output" class="state hidden">
      <div id="dimensions"></div>
      <button id="copy-btn" onclick="copyOutput()">Copy critique to clipboard</button>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
